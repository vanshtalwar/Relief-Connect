<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="rc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="rc-grad-light" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0ea5e9" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Clean transparent background -->
  <rect width="512" height="512" rx="120" fill="transparent" />
  
  <!-- Beautiful clear text -->
  <text x="50%" y="54%" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="260" fill="url(#rc-grad)" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)" letter-spacing="-5">RC</text>
  
  <!-- Sleek underline to give it a modern logo structure -->
  <path d="M 130 380 L 382 380" stroke="url(#rc-grad-light)" stroke-width="14" stroke-linecap="round" />
</svg>
